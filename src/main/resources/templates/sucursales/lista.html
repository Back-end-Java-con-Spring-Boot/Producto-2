<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Sleipnir - Lista de Sucursales</title>
</head>
<body class="bg-light">

<nav th:replace="~{layout :: header}"></nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-dark">Sucursales Disponibles</h2>
        <a th:href="@{/sucursales/nueva}" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-circle"></i> Añadir Sucursal
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0"> <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th class="ps-4">ID</th>
                <th>Nombre</th>
                <th>Dirección</th>
                <th>Teléfono</th>
                <th>Ciudad</th>
                <th class="text-center pe-4">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(listaSucursal)}">
                <td colspan="6" class="text-center py-4 text-muted">
                    No hay sucursales registradas actualmente.
                </td>
            </tr>

            <tr th:each="sucursal : ${listaSucursal}">
                <td class="ps-4 fw-bold" th:text="${sucursal.id}">1</td>
                <td th:text="${sucursal.nombre}">Nombre</td>
                <td th:text="${sucursal.direccion}">Dirección</td>
                <td th:text="${sucursal.telefono}">600000000</td>
                <td th:text="${sucursal.ciudad}">Ciudad</td>
                <td class="text-center pe-4">
                    <div class="btn-group" role="group">
                        <a th:href="@{/sucursales/editar/{id}(id=${sucursal.id})}"
                           class="btn btn-sm btn-outline-warning">Editar</a>
                        <a th:href="@{/sucursales/borrar/{id}(id=${sucursal.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('¿Estás seguro de borrar esta sucursal?')">Borrar</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</body>
</html>
